name: Test artifacts
on: [push]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-go@v1
        with: {go-version: '1.14'}

      - run: go build

      - uses: actions/upload-artifact@v2-preview
        with:
          name: foo
          path: actions-test

      - uses: actions/download-artifact@v2-preview
        with:
          name: foo

      - name: Debug
        run: |
          ls -alhF
          file actions-test
          chmod +x actions-test
          ./actions-test
